<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300">
  <defs>
    <filter id="paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#ffffff" surfaceScale="0.6" result="lit">
        <feDistantLight azimuth="45" elevation="70"/>
      </feDiffuseLighting>
    </filter>
  </defs>
  <rect width="300" height="300" fill="#F5F5F5"/>
  <rect width="300" height="300" filter="url(#paper)" opacity="0.12"/>
</svg>
